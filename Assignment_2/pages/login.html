<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up - Comic Strip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div class="signup-container">
        <div class="left-section">
            <div class="header">
                <a href="./dashboard.html" class="logo">comic strip</a>
                <a href="./signup.html" class="login-btn">Sign Up</a>
            </div>
            
            <div class="welcome-text">
                <h1>WELCOME</h1>
                <p>to comic strip creator</p>
            </div>

            <button class="google-btn">
                <img src="../assets/google-logo.png" alt="Google" width="20">
                Login with google
            </button>

            <div class="divider">or</div>

            <form>
                <input type="email" placeholder="Your Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="signup-btn" onclick="window.location.href='../pages/dashboard.html'">Login</button>
            </form>

            <p class="login-link">
                Don't have an account? <a href="./login.html">Sign Up</a>
            </p>
        </div>
        
        <div class="right-section">
            <img src="../assets/login.png" alt="login photo">
        </div>
    </div>
</body>
</html>
