<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Strip Creator - Create New</title>
    <link rel="stylesheet" href="../css/create-new.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">comic strip</div>
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="./dashboard.html"><i class="fa-solid fa-house"></i> Home</a>
                    </li>
                    <li>
                        <a href="mycomics.html"><i class="fa-solid fa-book-open"></i> My Comics</a>
                    </li>
                    <li class="active">
                        <a href="create-new.html"><i class="fa-solid fa-plus"></i> Create New</a>
                    </li>
                    <li>
                        <a href="./settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
                    </li>
                    <li>
                        <a href="../index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <h1>Create New Comic</h1>
            </div>

            <div class="template-section">
                <h2>Choose A Template</h2>
                <div class="template-grid">
                    <a href="#" class="template-card">
                        <div class="template-preview">
                            Blank
                        </div>
                        <div class="template-info">
                            <h3>Blank Canvas</h3>
                            <p>Start From Scratch</p>
                        </div>
                    </a>

                    <a href="#" class="template-card">
                        <div class="template-preview">
                            Super-Hero
                        </div>
                        <div class="template-info">
                            <h3>Superhero Template</h3>
                            <p>Action-Packed Layouts</p>
                        </div>
                    </a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
